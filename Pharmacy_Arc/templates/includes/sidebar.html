<button id="menuToggle" onclick="app.toggleMenu()" aria-label="Open menu">&#9776;</button>

<div class="sidebar">
    <div class="sidebar-logo">
        <img id="sidebarLogo" src="data:image/png;base64,{{logo}}" alt="Farmacia Carimas">
        <h2>Farmacia Carimas</h2>
    </div>
    <nav class="sidebar-nav">
        <div id="tab-dash" class="tab-btn active" onclick="app.tab('dash')"><span class="tab-icon">📋</span>Audit Entry</div>
        <div id="tab-calendar" class="tab-btn" onclick="app.tab('calendar')"><span class="tab-icon">📅</span>Calendar</div>
        <div id="tab-analytics" class="tab-btn" onclick="app.tab('analytics')"><span class="tab-icon">📊</span>Command Center</div>
        <div id="tab-logs" class="tab-btn" onclick="app.tab('logs')"><span class="tab-icon">📜</span>History</div>
        <div id="tab-users" class="tab-btn" onclick="app.tab('users')"><span class="tab-icon">👥</span>Users</div>
        <div id="tab-zreviews" class="tab-btn" onclick="app.tab('zreviews')"><span class="tab-icon">🔍</span>Z Reviews</div>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-user" id="userDisplay"></div>
        <button id="syncBtn" style="background:var(--warn);color:white;border:none;padding:8px 12px;border-radius:8px;font-weight:700;font-size:12px;display:none;cursor:pointer;width:100%;transition:all 0.15s" onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='none'">⚠️ Sync</button>
        <button onclick="app.openChangePassword()" style="padding:10px 14px;cursor:pointer;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:12px;font-weight:600;width:100%;transition:all 0.2s ease;min-height:44px" onmouseover="this.style.background='rgba(255,255,255,0.15)';this.style.color='white'" onmouseout="this.style.background='rgba(255,255,255,0.08)';this.style.color='rgba(255,255,255,0.8)'">Change Password</button>
        <button onclick="app.logout()" style="padding:10px 14px;cursor:pointer;background:rgba(239,68,68,0.9);color:white;border:none;border-radius:8px;font-size:12px;font-weight:800;width:100%;transition:all 0.15s ease;min-height:44px" onmouseover="this.style.background='#ef4444'" onmouseout="this.style.background='rgba(239,68,68,0.9)'">Log Out</button>
    </div>
</div>

<!-- Z Report Review Modal -->
<div id="zrModal" class="modal-backdrop" data-modal-close>
  <div style="background:white;border-radius:var(--radius);padding:32px;width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;position:relative;box-shadow:var(--shadow-lg)">
    <button class="modal-close" data-close-modal="zrModal">&#10005;</button>
    <h3 id="zrModalTitle" style="margin:0 0 18px;color:var(--txt);font-size:18px">Review Z Report</h3>
    <div id="zrModalBody"></div>
  </div>
</div>

<!-- Change Password Modal -->
<div id="changePwModal" class="modal-backdrop" data-modal-close>
  <div style="background:white;border-radius:var(--radius);padding:32px;width:400px;max-width:95vw;position:relative;box-shadow:var(--shadow-lg)">
    <button class="modal-close" data-close-modal="changePwModal">&#10005;</button>
    <h3 style="margin:0 0 22px;color:var(--txt);font-size:18px">Change Password</h3>
    <div id="changePwError" style="display:none;background:#fee2e2;color:#991b1b;padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin-bottom:16px"></div>
    <div id="changePwSuccess" style="display:none;background:#dcfce7;color:#166534;padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin-bottom:16px"></div>
    <label>Current Password</label>
    <input type="password" id="cpCurrent" placeholder="Enter current password" style="margin-bottom:12px">
    <label>New Password</label>
    <input type="password" id="cpNew" placeholder="Min 8 characters" style="margin-bottom:12px">
    <label>Confirm New Password</label>
    <input type="password" id="cpConfirm" placeholder="Re-enter new password" style="margin-bottom:22px">
    <button id="changePwSubmitBtn" class="btn-main" style="width:100%">Update Password</button>
  </div>
</div>

<!-- Bill Counter Modal -->
<div id="modalCount" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:9999;backdrop-filter:blur(3px)">
    <div style="background:white;padding:32px;border-radius:var(--radius);width:360px;max-width:95vw;border:2px solid var(--p);box-shadow:var(--shadow-lg)">
        <h2 style="margin:0 0 16px;font-size:18px;color:var(--txt)">Bill Counter</h2>
        <div id="billRows"></div>
        <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
        <h3 style="margin:0 0 16px;font-size:20px;color:var(--txt)">Total: <span id="billTotal" style="color:var(--p)">$0.00</span></h3>
        <button id="applyCountBtn" class="btn-main" style="width:100%">Apply Total</button>
        <button id="cancelCountBtn" class="btn-cancel-modal">Cancel</button>
    </div>
</div>
